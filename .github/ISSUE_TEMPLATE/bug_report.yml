name: Bug report
description: Something isn't working as expected
title: '[Bug]: '
labels: ['bug']
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to file a bug! Please fill in as much as you can.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, and what you expected instead.
      placeholder: When I import 0x… on chain 1, the Admin tab shows…
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Ideally a contract address + chain, or an ABI snippet, so we can reproduce.
      placeholder: |
        1. Import contract …
        2. Open the … tab
        3. Click …
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Studio (import/review/preview)
        - Generated app / renderer
        - Analyzer / classifier (detection)
        - Resolver (address → ABI/source)
        - Execution (reads/writes/simulation)
        - CLI / export
        - Docs
        - Other
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / commit
      placeholder: v0.1.0-beta or a commit SHA
  - type: textarea
    id: env
    attributes:
      label: Environment
      description: OS, Node/pnpm version, browser, wallet (if relevant).
      placeholder: Linux, Node 20.11, Chrome, MetaMask
